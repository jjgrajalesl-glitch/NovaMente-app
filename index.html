<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAMENTE — Neuro-Productividad & Riqueza Integral</title>
    <style>
        :root {
            --bg-dark: #0A1118;     
            --panel-bg: #121E2A;    
            --accent-cyan: #2A7B88; 
            --accent-gold: #D4AF37; 
            --text-main: #F0F4F8;   
            --text-muted: #8A99AD;  
            --border-color: #1E3145;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 460px;
            width: 100%;
            background: var(--panel-bg);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .brand-header { margin-bottom: 25px; }
        
        .logo-svg { width: 130px; height: auto; }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2A7B88 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0 0 0;
        }

        .subtitle { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; }

        .streak-badge {
            background: rgba(42, 123, 136, 0.1);
            color: #49C5D6;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(42, 123, 136, 0.25);
            margin-bottom: 30px;
        }

        .game-box {
            background: rgba(10, 17, 24, 0.6);
            padding: 25px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-cyan);
            text-align: left;
            margin-bottom: 25px;
        }

        .btn-option {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 16px;
            margin: 14px 0;
            border-radius: 14px;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .btn-option:hover { border-color: var(--accent-cyan); }

        .result-box { display: none; padding: 22px; border-radius: 14px; text-align: left; }

        .paywall { display: none; margin-top: 35px; padding: 28px; border: 1px dashed rgba(212, 175, 55, 0.4); border-radius: 20px; }

        .paywall h3 { color: var(--accent-gold); }

        .btn-pay {
            display: block;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, #1A545E 100%);
            color: #FFFFFF;
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="google_translate_element" style="display:none;"></div>
<div class="container">
    <div class="brand-header">
        <!-- SVG Logo Simplificado -->
        <svg class="logo-svg" viewBox="0 0 400 250" xmlns="http://w3.org">
            <path d="M120,180 C80,180 50,140 50,105 C50,65 90,45 130,45 C185,45 200,105 240,115 C280,125 320,100 340,75 C355,55 375,115 330,140 C280,170 245,125 210,120 C170,115 160,180 120,180 Z" fill="#2A7B88" opacity="0.85"/>
        </svg>
        <div class="brand-name">NOVAMENTE</div>
        <p class="subtitle">Neuro-Productividad</p>
    </div>
    <div class="streak-badge" id="streak-display">🔥 Racha: 0 días</div>
    <div class="game-box">Reto de Acción: ¿Opción segura o probabílistica?</div>
    <div id="opciones">
        <button class="btn-option" onclick="verificar('A')">A) Seguro</button>
        <button class="btn-option" onclick="verificar('B')">B) Probabilidad</button>
    </div>
    <div class="result-box" id="resultado"></div>
    <div class="paywall" id="paywall">
        <h3>🔒 VIP</h3>
        <a href="https://pay.hotmart.com/I106678231Y" class="btn-pay">Unirse</a>
    </div>
</div>
<script>
    // Lógica básica de racha
    let racha = localStorage.getItem('racha_novamente') || 0;
    document.getElementById('streak-display').innerText = `🔥 Racha: ${racha} días`;
    function verificar(r) {
        document.getElementById('resultado').style.display = "block";
        document.getElementById('paywall').style.display = "block";
        document.getElementById('resultado').innerText = r === 'B' ? "¡Excelente!" : "Intenta de nuevo.";
    }
</script>
    <script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'es',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
        
        // Forzar al sistema a leer el idioma nativo del dispositivo del usuario
        setTimeout(function() {
            var usuarioIdioma = navigator.language || navigator.userLanguage;
            var idiomaCorto = usuarioIdioma.substring(0, 2); // Ej: 'en', 'ja', 'de'
            
            if (idiomaCorto !== 'es') {
                var selector = document.querySelector('.goog-te-combo');
                if (selector) {
                    selector.value = idiomaCorto;
                    selector.dispatchEvent(new Event('change'));
                }
            }
        }, 1000); // Espera 1 segundo a que cargue la página para traducir limpiamente
    }
</script>
<script type="text/javascript" src="//://google.com"></script>
</body>
</html>
